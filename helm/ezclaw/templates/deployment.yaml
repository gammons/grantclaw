apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ezclaw.fullname" . }}
  labels:
    {{- include "ezclaw.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ezclaw
      app.kubernetes.io/instance: {{ .Values.bot.name }}
  template:
    metadata:
      labels:
        {{- include "ezclaw.labels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name | default (include "ezclaw.fullname" .) }}
      {{- end }}
      {{- if .Values.initContainers }}
      initContainers:
        {{- toYaml .Values.initContainers | nindent 8 }}
      {{- end }}
      containers:
        - name: ezclaw
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          args: ["--bot", "/config", "--data", "/data"]
          {{- if .Values.secrets.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.existingSecret }}
          {{- end }}
          env:
            - name: EZCLAW_DATA_DIR
              value: /data
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            {{- $toolfiles := .Files.Glob "botfiles/tools/*" }}
            {{- if or $toolfiles .Values.bot.tools }}
            - name: tools
              mountPath: /config/tools
              readOnly: true
            {{- end }}
            {{- $docfiles := .Files.Glob "botfiles/docs/*" }}
            {{- if or $docfiles .Values.bot.docs }}
            - name: docs
              mountPath: /config/docs
              readOnly: true
            {{- end }}
            - name: data
              mountPath: /data
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            exec:
              {{- if .Values.livenessProbe.slackHeartbeat }}
              # Fail liveness if the Slack listener has not touched the heartbeat file
              # within slackHeartbeatMaxAgeSeconds. K8s will restart the pod, which
              # re-establishes the Socket Mode WebSocket.
              command:
                - sh
                - -c
                - |
                  test -f /data/.slack_alive || exit 1
                  age=$(( $(date +%s) - $(stat -c %Y /data/.slack_alive) ))
                  test "$age" -lt {{ .Values.livenessProbe.slackHeartbeatMaxAgeSeconds }}
              {{- else }}
              command: ["ruby", "-e", "exit 0"]
              {{- end }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds | default 10 }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds | default 60 }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold | default 3 }}
          securityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
        {{- with .Values.extraContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "ezclaw.fullname" . }}
        {{- $toolfiles := .Files.Glob "botfiles/tools/*" }}
        {{- if or $toolfiles .Values.bot.tools }}
        - name: tools
          configMap:
            name: {{ include "ezclaw.fullname" . }}-tools
        {{- end }}
        {{- $docfiles := .Files.Glob "botfiles/docs/*" }}
        {{- if or $docfiles .Values.bot.docs }}
        - name: docs
          configMap:
            name: {{ include "ezclaw.fullname" . }}-docs
        {{- end }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "ezclaw.fullname" . }}-data
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
