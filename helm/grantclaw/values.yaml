image:
  repository: ghcr.io/gammons/grantclaw
  tag: latest

bot:
  name: example
  config: |
    name: example
    llm:
      provider: openrouter
      model: anthropic/claude-sonnet-4
      max_tokens: 4096
    schedule:
      heartbeat: "*/10 * * * *"
    context:
      system_files: [role.md]
      memory_file: memory.md
  files:
    role.md: |
      You are a helpful assistant.
    memory.md: |
      No memories yet.

secrets:
  existingSecret: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

persistence:
  size: 1Gi

# --- Optional extensions for bots that need extra system tools ---

# ServiceAccount for RBAC (e.g., kubectl access)
serviceAccount:
  create: false
  name: ""
  annotations: {}

# Extra environment variables
extraEnv: []
  # - name: KUBECONFIG
  #   value: /home/grantclaw/.kube/config

# Extra volume mounts for the main container
extraVolumeMounts: []
  # - name: kubeconfig
  #   mountPath: /home/grantclaw/.kube
  #   readOnly: true

# Extra volumes
extraVolumes: []
  # - name: kubeconfig
  #   secret:
