apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "grantclaw.fullname" . }}
  labels:
    {{- include "grantclaw.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: grantclaw
      app.kubernetes.io/instance: {{ .Values.bot.name }}
  template:
    metadata:
      labels:
        {{- include "grantclaw.labels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name | default (include "grantclaw.fullname" .) }}
      {{- end }}
      {{- if .Values.initContainers }}
      initContainers:
        {{- toYaml .Values.initContainers | nindent 8 }}
      {{- end }}
      containers:
        - name: grantclaw
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          args: ["--bot", "/config", "--data", "/data"]
          {{- if .Values.secrets.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.existingSecret }}
          {{- end }}
          env:
            - name: GRANTCLAW_DATA_DIR
              value: /data
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            {{- $toolfiles := .Files.Glob "botfiles/tools/*" }}
            {{- if or $toolfiles .Values.bot.tools }}
            - name: tools
              mountPath: /config/tools
              readOnly: true
            {{- end }}
            {{- $docfiles := .Files.Glob "botfiles/docs/*" }}
            {{- if or $docfiles .Values.bot.docs }}
            - name: docs
              mountPath: /config/docs
              readOnly: true
            {{- end }}
            - name: data
              mountPath: /data
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            exec:
              command: ["ruby", "-e", "exit 0"]
            initialDelaySeconds: 10
            periodSeconds: 60
          securityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
      volumes:
        - name: config
          configMap:
            name: {{ include "grantclaw.fullname" . }}
        {{- $toolfiles := .Files.Glob "botfiles/tools/*" }}
        {{- if or $toolfiles .Values.bot.tools }}
        - name: tools
          configMap:
            name: {{ include "grantclaw.fullname" . }}-tools
        {{- end }}
        {{- $docfiles := .Files.Glob "botfiles/docs/*" }}
        {{- if or $docfiles .Values.bot.docs }}
        - name: docs
          configMap:
            name: {{ include "grantclaw.fullname" . }}-docs
        {{- end }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "grantclaw.fullname" . }}-data
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
