name: pulse

slack:
  channels:
    - id: C085D6W27NY
      name: marketing
      require_mention: true
    - id: C0AQS7PN3EF
      name: truelist-team
      require_mention: true
      allow_bots: true
  dm_policy: open

llm:
  provider: openrouter
  model: anthropic/claude-sonnet-4
  max_tokens: 8192

schedule:
  heartbeat: "*/10 * * * *"
  weekly_report: "0 9 * * 1"
  monthly_report: "0 9 1 * *"

context:
  system_files:
    - role.md
    - heartbeat.md
  memory_file: memory.md

logging:
  level: info
